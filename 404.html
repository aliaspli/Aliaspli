<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>404 — Page Not Found | Ali Alaspli</title>

<!-- noindex: correct — 404 pages must never be indexed -->
<meta name="robots" content="noindex, follow">

<!-- Canonical omitted intentionally on 404 pages -->

<!-- ═══════════════════════════════
     FONTS — same stack as main site
     ═══════════════════════════════ -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500&family=DM+Mono:wght@300;400&family=Noto+Serif+Arabic:wght@400;500;700&display=swap" rel="stylesheet">

<style>
/* ── TOKENS — identical to style.css ── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --ink:        #0f0f0f;
  --ink-mid:    #2a2a2a;
  --ink-soft:   #555;
  --ink-muted:  #888;
  --rule:       #d8d4cc;
  --rule-dark:  #b0ab9f;
  --bg:         #faf8f4;
  --bg-card:    #f0ece4;
  --white:      #ffffff;
  --max:        700px;

  --font-display: 'Playfair Display', Georgia, serif;
  --font-body:    'Source Serif 4', Georgia, serif;
  --font-mono:    'DM Mono', 'Courier New', monospace;
}

html {
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-size-adjust: 100%;
  -webkit-text-size-adjust: 100%;
}

body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font-body);
  font-size: 1.0625rem;
  line-height: 1.75;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

a { color: inherit; text-decoration: none; }

:focus-visible {
  outline: 2px solid var(--ink);
  outline-offset: 3px;
  border-radius: 2px;
}

/* ── TOPBAR — matches main site ── */
.topbar {
  height: 48px;
  background: var(--bg);
  border-bottom: 1px solid var(--rule);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  flex-shrink: 0;
}
.topbar-home {
  font-family: var(--font-mono);
  font-size: 0.6875rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--ink-muted);
  transition: color 0.18s;
}
.topbar-home:hover { color: var(--ink); }

.lang-btn {
  font-family: var(--font-mono);
  font-size: 0.6875rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 6px 18px;
  border: 1px solid var(--rule-dark);
  color: var(--ink-soft);
  background: transparent;
  cursor: pointer;
  transition: background 0.18s, color 0.18s, border-color 0.18s;
  display: inline-block;
  line-height: 1;
}
.lang-btn:hover,
.lang-btn:focus-visible {
  background: var(--ink);
  color: var(--white);
  border-color: var(--ink);
}

/* ── MAIN CONTENT ── */
main {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 52px 24px;
}

.wrap {
  width: 100%;
  max-width: var(--max);
}

/* Error number — decorative, not h1 */
.error-num {
  font-family: var(--font-display);
  font-size: clamp(5rem, 18vw, 9rem);
  font-weight: 700;
  line-height: 1;
  color: var(--rule-dark);
  letter-spacing: -2px;
  margin-bottom: 4px;
  /* purely decorative — hidden from screen readers */
}

.error-eyebrow {
  font-family: var(--font-mono);
  font-size: 0.6875rem;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--ink-muted);
  margin-bottom: 20px;
}

/* h1 carries the actual descriptive title for SEO & a11y */
.error-title {
  font-family: var(--font-display);
  font-size: clamp(1.5rem, 4vw, 2.25rem);
  font-weight: 700;
  line-height: 1.15;
  margin-bottom: 14px;
}

hr.rule {
  border: none;
  border-top: 1px solid var(--rule);
  margin: 24px 0;
}

.error-body {
  font-size: 0.9688rem;
  color: var(--ink-mid);
  line-height: 1.85;
  margin-bottom: 28px;
  max-width: 520px;
}

/* ── BUTTONS — matches .btn-fill from main site ── */
.btn-row {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.btn-fill {
  display: inline-flex;
  align-items: center;
  font-family: var(--font-mono);
  font-size: 0.6875rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 10px 20px;
  background: var(--ink);
  color: var(--white);
  border: 1px solid var(--ink);
  transition: background 0.18s, border-color 0.18s;
}
.btn-fill:hover,
.btn-fill:focus-visible {
  background: var(--ink-mid);
  border-color: var(--ink-mid);
}

.btn-ghost {
  display: inline-flex;
  align-items: center;
  font-family: var(--font-mono);
  font-size: 0.6875rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 10px 20px;
  background: transparent;
  color: var(--ink);
  border: 1px solid var(--rule-dark);
  transition: background 0.18s, color 0.18s, border-color 0.18s;
}
.btn-ghost:hover,
.btn-ghost:focus-visible {
  background: var(--ink);
  color: var(--white);
  border-color: var(--ink);
}

/* ── FOOTER ── */
footer {
  flex-shrink: 0;
  border-top: 1px solid var(--rule);
  padding: 18px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
  max-width: 100%;
}
footer p {
  font-family: var(--font-mono);
  font-size: 0.625rem;
  letter-spacing: 1px;
  color: var(--ink-muted);
}
footer a {
  border-bottom: 1px solid var(--rule);
  padding-bottom: 1px;
  transition: border-color 0.18s;
}
footer a:hover { border-color: var(--ink); }
.footer-sep { color: var(--rule-dark); margin: 0 4px; }

/* ── RTL OVERRIDES ── */
[dir="rtl"] {
  --font-display: 'Noto Serif Arabic', serif;
  --font-body:    'Noto Serif Arabic', serif;
  --font-mono:    'Noto Serif Arabic', serif;
}
[dir="rtl"] .error-num        { letter-spacing: 0; }
[dir="rtl"] .error-eyebrow    { letter-spacing: 0; font-size: 0.75rem; }
[dir="rtl"] .btn-fill,
[dir="rtl"] .btn-ghost        { letter-spacing: 0; font-size: 0.8125rem; }
[dir="rtl"] .topbar-home      { letter-spacing: 0; font-size: 0.75rem; }
[dir="rtl"] .lang-btn         { letter-spacing: 0; font-size: 0.75rem; }
[dir="rtl"] footer p          { letter-spacing: 0; font-size: 0.75rem; }
[dir="rtl"] .topbar           { flex-direction: row-reverse; }

/* ── RESPONSIVE ── */
@media (max-width: 540px) {
  main { padding: 36px 18px; align-items: flex-start; }
  footer { flex-direction: column; align-items: center; text-align: center; }
}
</style>
</head>
<body>

<!-- TOPBAR -->
<nav class="topbar" aria-label="Site navigation">
  <a href="/" class="topbar-home" id="nav-home">aliaspli.com</a>
  <a href="#" class="lang-btn" id="lang-switch"></a>
</nav>

<!-- MAIN -->
<main>
  <div class="wrap">

    <p class="error-num" aria-hidden="true">404</p>
    <p class="error-eyebrow" id="txt-eyebrow"></p>

    <!-- h1: descriptive title — correct for SEO, not the number -->
    <h1 class="error-title" id="txt-title"></h1>

    <hr class="rule">

    <p class="error-body" id="txt-body"></p>

    <div class="btn-row">
      <a class="btn-fill" href="/" id="btn-home"></a>
      <a class="btn-ghost" href="#" id="btn-lang"></a>
    </div>

  </div>
</main>

<!-- FOOTER -->
<footer>
  <p id="footer-copy"></p>
  <p id="footer-role"></p>
</footer>

<!-- ═══════════════════════════════════════════════
     LANGUAGE DETECTION + CONTENT INJECTION
     Detects Arabic from URL path (/ar/) or browser
     language. Falls back to English.
     ═══════════════════════════════════════════════ -->
<script>
(function () {
  var path = (location.pathname || '').toLowerCase();
  var lang = (navigator.language || navigator.userLanguage || '').toLowerCase();
  var isAr = path.indexOf('/ar') === 0 || lang.indexOf('ar') === 0;

  var strings = {
    en: {
      htmlLang:   'en',
      htmlDir:    'ltr',
      eyebrow:    'Page not found',
      title:      'This page does not exist',
      body:       'The page you are looking for does not exist or may have been moved. Check the address and try again, or return to the homepage.',
      btnHome:    'Homepage ↗',
      btnLang:    'عربي',
      btnLangHref:'/ar/',
      navHome:    'aliaspli.com',
      langSwitch: '/ar/',
      footerCopy: '© 2026 Ali Alaspli · aliaspli.com',
      footerRole: 'Executive Director, Libya Crimes Watch'
    },
    ar: {
      htmlLang:   'ar',
      htmlDir:    'rtl',
      eyebrow:    'الصفحة غير موجودة',
      title:      'هذه الصفحة غير موجودة',
      body:       'الرابط الذي تبحث عنه غير موجود أو ربما تم نقله. تحقق من العنوان وحاول مجدداً، أو عد إلى الصفحة الرئيسية.',
      btnHome:    'الصفحة الرئيسية ↗',
      btnLang:    'English',
      btnLangHref:'/',
      navHome:    'aliaspli.com',
      langSwitch: '/',
      footerCopy: '© 2026 علي العسبلي · aliaspli.com',
      footerRole: 'المدير التنفيذي، منظمة رصد الجرائم في ليبيا'
    }
  };

  var s = isAr ? strings.ar : strings.en;

  /* Set document direction and language */
  document.documentElement.setAttribute('lang', s.htmlLang);
  document.documentElement.setAttribute('dir',  s.htmlDir);

  /* Inject text content */
  document.getElementById('txt-eyebrow').textContent  = s.eyebrow;
  document.getElementById('txt-title').textContent    = s.title;
  document.getElementById('txt-body').textContent     = s.body;
  document.getElementById('btn-home').textContent     = s.btnHome;
  document.getElementById('btn-lang').textContent     = s.btnLang;
  document.getElementById('btn-lang').href            = s.btnLangHref;
  document.getElementById('nav-home').textContent     = s.navHome;
  document.getElementById('lang-switch').textContent  = isAr ? 'English' : 'عربي';
  document.getElementById('lang-switch').href         = s.langSwitch;
  document.getElementById('lang-switch').setAttribute('hreflang', isAr ? 'en' : 'ar');
  document.getElementById('lang-switch').setAttribute('lang',     isAr ? 'en' : 'ar');
  document.getElementById('footer-copy').textContent  = s.footerCopy;
  document.getElementById('footer-role').innerHTML    =
    isAr
      ? 'المدير التنفيذي، <a href="https://lcw.ngo" target="_blank" rel="noopener noreferrer">منظمة رصد الجرائم في ليبيا</a>'
      : 'Executive Director, <a href="https://lcw.ngo" target="_blank" rel="noopener noreferrer">Libya Crimes Watch</a>';

  /* Page title */
  document.title = isAr
    ? '404 — الصفحة غير موجودة | علي العسبلي'
    : '404 — Page Not Found | Ali Alaspli';
}());
</script>

</body>
</html>
